name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # API keys are not read at build time (all routes are force-dynamic).
          # Secrets are only needed at runtime — no real values required here.
          ADMIN_SECRET: ci-build-secret
          USER_JWT_SECRET: ci-build-secret
